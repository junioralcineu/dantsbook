<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" sizes="16x16" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="images/logo-favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/logo-favicon.png">
<title>Dant's — Free Preview · Meditations</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

<script defer src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<link rel="stylesheet" href="styles.css" />

<style>
  .reader-shell {
    max-width: 720px;
    margin: 0 auto;
    padding: clamp(40px, 6vw, 80px) 28px 80px;
  }
  .reader-meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; margin-bottom: 32px;
    border-top: .5px solid var(--line); border-bottom: .5px solid var(--line);
    font: 500 11.5px/1 var(--font-body); color: var(--ink-3);
    letter-spacing: .12em; text-transform: uppercase;
  }
  .reader-cover {
    display: flex; justify-content: center; margin-bottom: 36px;
  }
  .reader-cover .cover { width: 200px; aspect-ratio: 2/3; }
  .reader-title {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(38px, 5vw, 60px);
    letter-spacing: -.02em; line-height: 1.05;
    margin: 0; text-align: center; text-wrap: balance;
  }
  .reader-author {
    text-align: center; margin-top: 14px;
    font: 500 12.5px/1 var(--font-body);
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3);
  }
  .reader-divider {
    display: flex; justify-content: center; align-items: center;
    gap: 14px; margin: 48px 0;
    color: var(--accent);
  }
  .reader-divider .line { flex: 1; height: 1px; background: var(--line); max-width: 80px; }
  .reader-divider .ornament { font-size: 14px; }

  .reader-body p {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: 21px;
    line-height: 1.65;
    color: var(--ink);
    margin: 0 0 1.5em;
    text-wrap: pretty;
  }
  /* drop cap on first paragraph */
  .reader-body p:first-of-type::first-letter {
    font-family: var(--font-display);
    float: left;
    font-size: 5.4em;
    line-height: .92;
    padding: 4px 12px 0 0;
    color: var(--accent);
    font-weight: 400;
  }

  .reader-end {
    margin: 60px 0 0; padding: 28px;
    border-radius: 18px; text-align: center;
  }
  .reader-end h3 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(22px, 2.4vw, 28px); letter-spacing: -.01em;
    margin: 12px 0 8px;
  }
  .reader-actions {
    display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap;
  }

  /* reading progress on this page tracks the article specifically */
  .article-progress {
    position: fixed; left: 0; right: 0; top: 0; height: 2px; background: transparent;
    z-index: 60;
  }
  .article-progress > span {
    display: block; height: 100%; background: var(--accent); width: 0;
    box-shadow: 0 0 8px var(--accent);
  }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div class="bg-stage" aria-hidden="true"></div>
<div class="article-progress"><span id="article-prog" /></div>

<div id="app"></div>

<script defer src="tweaks-panel.js"></script>
<script defer src="i18n.js"></script>
<script defer src="data.js"></script>
<script defer src="components.js"></script>
<script defer src="preview-page.js"></script>
</body>
</html>
