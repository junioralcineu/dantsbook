<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" sizes="16x16" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="images/logo-favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/logo-favicon.png">
<title>Dant's — Opinions from the readers</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<link rel="stylesheet" href="styles.css" />

<style>
  .page-head { padding: clamp(60px, 9vw, 120px) 0 30px; text-align: center; }
  .page-head h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(40px, 6vw, 72px);
    letter-spacing: -.02em; line-height: 1.05;
    margin: 14px 0 0; text-wrap: balance;
  }
  .page-head p {
    max-width: 56ch; margin: 18px auto 0;
    font-size: clamp(15px, 1.2vw, 17px); color: var(--ink-2);
    line-height: 1.55;
  }

  .opinions-grid {
    display: grid; grid-template-columns: 1fr; gap: 18px;
    margin-top: 48px;
  }
  @media (min-width: 760px)  { .opinions-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .opinions-grid { grid-template-columns: 1fr 1fr 1fr; } }

  .op-card {
    padding: 26px; border-radius: 20px;
    display: flex; flex-direction: column; gap: 14px;
    transition: transform .25s ease;
  }
  .op-card:hover { transform: translateY(-3px); }
  .op-quote {
    font-family: var(--font-display); font-weight: 400;
    font-size: 19px; line-height: 1.45; letter-spacing: -.005em;
    color: var(--ink); margin: 0;
    text-wrap: pretty;
  }
  .op-quote::before { content: "“"; color: var(--accent); margin-right: 4px; }
  .op-quote::after  { content: "”"; color: var(--accent); margin-left: 4px; }
  .op-row { display: flex; align-items: center; gap: 12px; margin-top: auto; padding-top: 8px; }
  .op-avatar {
    width: 40px; height: 40px; border-radius: 999px;
    flex-shrink: 0; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.1);
  }
  .op-name { font-weight: 500; color: var(--ink); font-size: 14px; }
  .op-where { color: var(--ink-3); font-size: 12px; }
  .op-meta { display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px; border-top: .5px solid var(--line);
    font: 500 11.5px/1 var(--font-body); color: var(--ink-3); letter-spacing: .04em; }
  .op-stars { color: var(--accent); letter-spacing: 2px; font-size: 13px; }

  .submit-card {
    margin-top: 80px; padding: clamp(28px, 4vw, 48px);
    border-radius: 24px; text-align: center;
  }
  .submit-card h2 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(26px, 3vw, 36px); letter-spacing: -.015em;
    margin: 12px 0 8px;
  }
  .submit-form {
    display: grid; grid-template-columns: 1fr; gap: 10px;
    max-width: 520px; margin: 22px auto 0;
  }
  .submit-form input, .submit-form textarea {
    width: 100%;
    padding: 12px 16px; border-radius: 12px;
    border: .5px solid var(--line);
    background: color-mix(in oklab, white 70%, transparent);
    font: 400 14.5px var(--font-body); color: var(--ink);
    outline: none; resize: vertical;
  }
  .submit-form input::placeholder, .submit-form textarea::placeholder { color: var(--ink-3); }
  .submit-form textarea { min-height: 120px; }
  .submit-form input:focus, .submit-form textarea:focus { border-color: var(--ink-3); }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div class="bg-stage" aria-hidden="true"></div>
<div id="scroll-progress" class="scroll-progress"></div>

<div id="app"></div>

<script src="tweaks-panel.js"></script>
<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="components.js"></script>
<script src="opinions-page.js"></script>
</body>
</html>
