<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="images/logo-favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/logo-favicon.png">
<title>Dant's — Opinions from the readers</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="stylesheet" href="styles.css" />

<style>
  .page-head { padding: clamp(60px, 9vw, 120px) 0 30px; text-align: center; }
  .page-head h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(40px, 6vw, 72px);
    letter-spacing: -.02em; line-height: 1.05;
    margin: 14px 0 0; text-wrap: balance;
  }
  .page-head p {
    max-width: 56ch; margin: 18px auto 0;
    font-size: clamp(15px, 1.2vw, 17px); color: var(--ink-2);
    line-height: 1.55;
  }

  .opinions-grid {
    display: grid; grid-template-columns: 1fr; gap: 18px;
    margin-top: 48px;
  }
  @media (min-width: 760px)  { .opinions-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .opinions-grid { grid-template-columns: 1fr 1fr 1fr; } }

  .op-card {
    padding: 26px; border-radius: 20px;
    display: flex; flex-direction: column; gap: 14px;
    transition: transform .25s ease;
  }
  .op-card:hover { transform: translateY(-3px); }
  .op-quote {
    font-family: var(--font-display); font-weight: 400;
    font-size: 19px; line-height: 1.45; letter-spacing: -.005em;
    color: var(--ink); margin: 0;
    text-wrap: pretty;
  }
  .op-quote::before { content: "“"; color: var(--accent); margin-right: 4px; }
  .op-quote::after  { content: "”"; color: var(--accent); margin-left: 4px; }
  .op-row { display: flex; align-items: center; gap: 12px; margin-top: auto; padding-top: 8px; }
  .op-avatar {
    width: 40px; height: 40px; border-radius: 999px;
    flex-shrink: 0; box-shadow: inset 0 0 0 .5px rgba(0,0,0,.1);
  }
  .op-name { font-weight: 500; color: var(--ink); font-size: 14px; }
  .op-where { color: var(--ink-3); font-size: 12px; }
  .op-meta { display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px; border-top: .5px solid var(--line);
    font: 500 11.5px/1 var(--font-body); color: var(--ink-3); letter-spacing: .04em; }
  .op-stars { color: var(--accent); letter-spacing: 2px; font-size: 13px; }

  .submit-card {
    margin-top: 80px; padding: clamp(28px, 4vw, 48px);
    border-radius: 24px; text-align: center;
  }
  .submit-card h2 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(26px, 3vw, 36px); letter-spacing: -.015em;
    margin: 12px 0 8px;
  }
  .submit-form {
    display: grid; grid-template-columns: 1fr; gap: 10px;
    max-width: 520px; margin: 22px auto 0;
  }
  .submit-form input, .submit-form textarea {
    width: 100%;
    padding: 12px 16px; border-radius: 12px;
    border: .5px solid var(--line);
    background: color-mix(in oklab, white 70%, transparent);
    font: 400 14.5px var(--font-body); color: var(--ink);
    outline: none; resize: vertical;
  }
  .submit-form input::placeholder, .submit-form textarea::placeholder { color: var(--ink-3); }
  .submit-form textarea { min-height: 120px; }
  .submit-form input:focus, .submit-form textarea:focus { border-color: var(--ink-3); }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div class="bg-stage" aria-hidden="true"></div>
<div id="scroll-progress" class="scroll-progress"></div>

<div id="app"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="i18n.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel">

const { useState } = React;

function OpinionCard({ o }) {
  const { t, d } = useLang();
  return (
    <article className="op-card glass">
      <div className="op-stars" aria-label={`${o.rating} of 5`}>
        {"★".repeat(o.rating)}{"☆".repeat(5 - o.rating)}
      </div>
      <p className="op-quote">{d(o, "text")}</p>
      <div className="op-row">
        <div className={`op-avatar cover ${o.avatar}`} style={{ aspectRatio: "auto", padding: 0 }} />
        <div>
          <div className="op-name">{o.name}</div>
          <div className="op-where">{o.where}</div>
        </div>
      </div>
      <div className="op-meta">
        <span>{t("opinions.on")} <em>{o.book}</em></span>
        <span>↗</span>
      </div>
    </article>
  );
}

function OpinionsPage() {
  const { t } = useLang();
  const [tw, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "theme": "light",
    "accentHue": 35,
    "fontPair": "fraunces-inter",
    "animSpeed": "normal",
    "grain": true
  }/*EDITMODE-END*/);

  React.useEffect(() => {
    const r = document.documentElement;
    r.setAttribute("data-theme", tw.theme === "navy" ? "navy" : "light");
    r.style.setProperty("--accent",   `oklch(0.58 0.13 ${tw.accentHue})`);
    r.style.setProperty("--accent-2", `oklch(0.58 0.13 ${(Number(tw.accentHue) + 60) % 360})`);
    const PAIRS = {
      "fraunces-inter":  { display: "'Fraunces', Georgia, serif",           body: "'Inter', system-ui, sans-serif" },
      "garamond-inter":  { display: "'EB Garamond', Georgia, serif",        body: "'Inter', system-ui, sans-serif" },
      "cormorant-inter": { display: "'Cormorant Garamond', Georgia, serif", body: "'Inter', system-ui, sans-serif" },
    };
    const p = PAIRS[tw.fontPair] || PAIRS["fraunces-inter"];
    r.style.setProperty("--font-display", p.display);
    r.style.setProperty("--font-body",    p.body);
    document.body.dataset.anim = tw.animSpeed;
  }, [tw]);

  const [form, setForm] = useState({ name: "", book: "", text: "" });
  const [sent, setSent] = useState(false);
  const submit = (e) => {
    e.preventDefault();
    if (form.name.trim() && form.text.trim()) setSent(true);
  };

  return (
    <>
      <ScrollProgress />
      <Nav activeKey="opinions" musicOn={false} onPlayMusic={() => {}} />

      <section className="wrap page-head">
        <div className="eyebrow">{t("opinions.eyebrow")}</div>
        <h1>{t("opinions.h1")}</h1>
        <p>{t("opinions.desc")}</p>
      </section>

      <section className="wrap">
        <div className="opinions-grid">
          {OPINIONS.map((o, i) => (
            <Reveal key={o.name} delay={i * 60}>
              <OpinionCard o={o} />
            </Reveal>
          ))}
        </div>

        <Reveal>
          <form className="submit-card glass" onSubmit={submit}>
            <div className="eyebrow">{t("opinions.sendEyebrow")}</div>
            <h2>{t("opinions.sendH2")}</h2>
            <p className="body-m" style={{ maxWidth: "52ch", margin: "0 auto", color: "var(--ink-2)" }}>
              {t("opinions.sendDesc")}
            </p>
            <div className="submit-form">
              <input
                type="text"
                placeholder={t("opinions.namePlaceholder")}
                value={form.name}
                onChange={(e) => setForm({ ...form, name: e.target.value })}
              />
              <input
                type="text"
                placeholder={t("opinions.bookPlaceholder")}
                value={form.book}
                onChange={(e) => setForm({ ...form, book: e.target.value })}
              />
              <textarea
                placeholder={t("opinions.textPlaceholder")}
                value={form.text}
                onChange={(e) => setForm({ ...form, text: e.target.value })}
              />
              <div style={{ display: "flex", justifyContent: "center", marginTop: 6 }}>
                <button className="pill solid" type="submit">
                  {sent ? t("opinions.sent") : t("opinions.send")}
                </button>
              </div>
              {sent && (
                <div className="body-m" style={{ color: "var(--ink-2)", marginTop: 6 }}>
                  {t("opinions.thanks")}
                </div>
              )}
            </div>
          </form>
        </Reveal>
      </section>

      <Footer />

      <TweaksPanel title="Tweaks">
        <TweakSection label={t("tweaks.theme")} />
        <TweakRadio label={t("tweaks.mood")} value={tw.theme}
          options={[{value:"light",label:t("tweaks.light")},{value:"navy",label:t("tweaks.navy")}]}
          onChange={(v)=>setTweak("theme",v)} />
        <TweakSlider label={t("tweaks.accentHue")} min={0} max={360} step={5} value={tw.accentHue} unit="°"
          onChange={(v)=>setTweak("accentHue",v)} />
        <TweakSection label={t("tweaks.typography")} />
        <TweakSelect label={t("tweaks.typePairing")} value={tw.fontPair}
          options={[
            {value:"fraunces-inter",label:"Fraunces · Inter"},
            {value:"garamond-inter",label:"EB Garamond · Inter"},
            {value:"cormorant-inter",label:"Cormorant · Inter"},
          ]}
          onChange={(v)=>setTweak("fontPair",v)} />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(
  <LangProvider><OpinionsPage /></LangProvider>
);
</script>
</body>
</html>
