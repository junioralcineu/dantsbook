<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" type="image/png" sizes="16x16" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-favicon.png">
<link rel="icon" type="image/png" sizes="192x192" href="images/logo-favicon.png">
<link rel="apple-touch-icon" sizes="180x180" href="images/logo-favicon.png">
<title>Dant's — Articles</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<link rel="stylesheet" href="styles.css" />

<style>
  /* Articles-only additions */
  .page-head { padding: clamp(60px, 9vw, 120px) 0 30px; text-align: center; }
  .page-head h1 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(40px, 6vw, 72px);
    letter-spacing: -.02em; line-height: 1.05;
    margin: 14px 0 0; text-wrap: balance;
  }
  .page-head p {
    max-width: 56ch; margin: 18px auto 0;
    font-size: clamp(15px, 1.2vw, 17px); color: var(--ink-2);
    line-height: 1.55;
  }
  .articles-grid {
    display: grid; grid-template-columns: 1fr; gap: 18px;
    margin-top: 48px;
  }
  @media (min-width: 720px) { .articles-grid { grid-template-columns: 1fr 1fr; } }
  @media (min-width: 1080px) { .articles-grid { grid-template-columns: 1fr 1fr 1fr; } }

  .article-card {
    padding: 18px; border-radius: 18px; cursor: pointer;
    display: flex; flex-direction: column; gap: 14px;
    transition: transform .35s ease, box-shadow .35s ease;
    text-decoration: none; color: inherit;
  }
  .article-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 24px 64px -16px rgba(0,0,0,.18);
  }
  .article-cover {
    aspect-ratio: 5/3; border-radius: 10px; overflow: hidden; position: relative;
    transition: aspect-ratio .4s ease;
  }
  .article-cover .cover { aspect-ratio: auto; height: 100%; border-radius: 10px; padding: 18px; }
  .article-meta {
    display: flex; gap: 10px; align-items: center;
    font: 500 11.5px/1 var(--font-body); color: var(--ink-3);
    letter-spacing: .04em;
  }
  .article-h {
    font-family: var(--font-display); font-weight: 400;
    font-size: 22px; letter-spacing: -.01em; line-height: 1.15;
    margin: 0; text-wrap: balance;
  }
  .article-dek { color: var(--ink-2); margin: 0; font-size: 14.5px; line-height: 1.5; }
  .article-foot { display: flex; justify-content: space-between; padding-top: 8px;
    font: 500 12px/1 var(--font-body); color: var(--ink-3); }

  /* ─── Animação de expansão ao passar o cursor ─── */
  .article-expand-wrap {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .4s cubic-bezier(.2,.7,.2,1);
  }
  .article-card:hover .article-expand-wrap {
    grid-template-rows: 1fr;
  }
  .article-expand-inner {
    overflow: hidden;
    padding-top: 0;
    transition: padding-top .4s ease;
  }
  .article-card:hover .article-expand-inner {
    padding-top: 4px;
  }
  /* Em touch (sem hover), mostrar o conteúdo sempre */
  @media (hover: none) {
    .article-expand-wrap { grid-template-rows: 1fr; }
    .article-expand-inner { padding-top: 4px; }
  }
</style>

<script type="application/json" id="speaker-notes">[]</script>
</head>
<body>

<div class="bg-stage" aria-hidden="true"></div>
<div id="scroll-progress" class="scroll-progress"></div>

<div id="app"></div>

<script src="tweaks-panel.js"></script>
<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="components.js"></script>
<script src="articles-page.js"></script>
</body>
</html>
