<style>
  /* Reading room — full-screen focus shell */
  html, body { height: 100%; }
  body { overflow: hidden; }

  .room {
    position: relative;
    min-height: 100vh;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    color: var(--ink);
  }
  .room.dim { background: oklch(0.94 0.008 80); transition: background 1.2s ease; }
  html[data-theme="navy"] .room.dim { background: oklch(0.16 0.04 245); }

  /* hide global animated background — replace with own ambient orbs */
  body.reading .bg-stage { display: none; }

  /* top bar */
  .room-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; z-index: 5; position: relative;
  }
  .room-back {
    display: inline-flex; align-items: center; gap: 8px;
    text-decoration: none; color: var(--ink-2);
    font: 500 13px/1 var(--font-body);
    padding: 8px 14px; border-radius: 999px;
    transition: color .2s ease, background .2s ease;
  }
  .room-back:hover { color: var(--ink); background: color-mix(in oklab, var(--ink) 5%, transparent); }
  .room-meta {
    font: 500 11.5px/1 var(--font-body);
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--ink-3);
  }

  /* center stage */
  .room-stage {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px;
    overflow: hidden;
  }

  /* breathing orbs (ambient) */
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(60px);
    opacity: .55;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  .orb.o1 { width: 540px; height: 540px; top: -10%; left: -8%;
            background: color-mix(in oklab, var(--accent) 30%, transparent);
            animation: breathe 9s ease-in-out infinite alternate; }
  .orb.o2 { width: 460px; height: 460px; bottom: -10%; right: -6%;
            background: color-mix(in oklab, var(--accent-2) 30%, transparent);
            animation: breathe 11s ease-in-out infinite alternate -3s; }
  .orb.o3 { width: 360px; height: 360px; top: 30%; right: 18%;
            background: color-mix(in oklab, var(--accent) 18%, transparent);
            animation: breathe 13s ease-in-out infinite alternate -6s; }
  @keyframes breathe {
    from { transform: translate(0,0) scale(1); opacity: .35; }
    to   { transform: translate(2%, -2%) scale(1.08); opacity: .65; }
  }
  body[data-anim="off"] .orb { animation: none; }

  /* the timer dial */
  .dial-wrap {
    position: relative; z-index: 2;
    width: clamp(260px, 38vmin, 420px);
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
  }
  .dial-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .dial-track { fill: none; stroke: color-mix(in oklab, var(--ink) 8%, transparent); stroke-width: 2; }
  .dial-fill  { fill: none; stroke: var(--accent); stroke-width: 2.2;
                stroke-linecap: round;
                transition: stroke-dashoffset .6s ease; }
  .dial-pulse {
    position: absolute; inset: 0; border-radius: 50%;
    background: radial-gradient(closest-side, color-mix(in oklab, var(--accent) 15%, transparent) 0%, transparent 70%);
    animation: pulse 6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); opacity: .6; }
    50%     { transform: scale(1.05); opacity: .9; }
  }
  body[data-anim="off"] .dial-pulse { animation: none; }

  .dial-inner {
    position: relative; z-index: 2; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .dial-time {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(64px, 11vmin, 116px);
    letter-spacing: -.03em; line-height: 1;
    color: var(--ink); font-variant-numeric: tabular-nums;
  }
  .dial-state {
    font: 500 11px/1 var(--font-body); letter-spacing: .22em;
    text-transform: uppercase; color: var(--ink-3);
  }

  /* controls below dial */
  .room-controls {
    position: relative; z-index: 2;
    display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
    margin-top: 28px;
  }
  .ctrl {
    display: inline-flex; align-items: center; gap: 8px;
    border-radius: 999px;
    padding: 12px 22px; font: 500 14px/1 var(--font-body);
    color: var(--ink); cursor: default;
    border: .5px solid color-mix(in oklab, var(--ink) 12%, transparent);
    background: color-mix(in oklab, white 65%, transparent);
    -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
    transition: transform .2s ease, background .2s ease;
  }
  .ctrl:hover { transform: translateY(-1px); background: color-mix(in oklab, white 85%, transparent); }
  .ctrl.primary { background: var(--ink); color: var(--bg); border-color: var(--ink); padding: 14px 28px; }
  .ctrl.primary:hover { background: color-mix(in oklab, var(--ink) 88%, var(--accent)); }
  .ctrl.icon { padding: 12px; width: 42px; height: 42px; justify-content: center; }
  html[data-theme="navy"] .ctrl { background: color-mix(in oklab, white 8%, transparent); border-color: rgba(255,255,255,.18); }
  html[data-theme="navy"] .ctrl.primary { background: oklch(.95 .005 80); color: oklch(.20 .04 245); }

  /* preset chips */
  .presets {
    display: flex; gap: 6px; justify-content: center;
    margin-top: 18px; z-index: 2; position: relative;
  }
  .preset {
    border-radius: 999px; padding: 6px 14px;
    font: 500 12px/1 var(--font-body);
    color: var(--ink-3);
    border: .5px solid var(--line);
    background: transparent;
    cursor: default;
    transition: all .2s ease;
  }
  .preset[aria-pressed="true"] {
    background: var(--ink); color: var(--bg); border-color: var(--ink);
  }
  .preset:hover { color: var(--ink); }

  /* bottom bar — sessions + ambience volume */
  .room-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 28px; z-index: 5; position: relative;
    flex-wrap: wrap; gap: 14px;
  }
  .session-line {
    font: 500 11.5px/1 var(--font-body);
    letter-spacing: .12em; text-transform: uppercase; color: var(--ink-3);
    display: flex; align-items: center; gap: 12px;
  }
  .pip-row { display: inline-flex; gap: 4px; }
  .pip {
    width: 6px; height: 6px; border-radius: 999px;
    background: color-mix(in oklab, var(--ink) 16%, transparent);
  }
  .pip.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* ambience cluster */
  .amb {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 10px 6px 6px; border-radius: 999px;
    border: .5px solid var(--line);
    background: color-mix(in oklab, white 50%, transparent);
    -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  }
  html[data-theme="navy"] .amb { background: color-mix(in oklab, white 6%, transparent); border-color: rgba(255,255,255,.14); }

  .amb-btn {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--ink); color: var(--bg);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: default;
    transition: background .2s ease, transform .2s ease;
  }
  .amb-btn:hover { transform: scale(1.06); }
  .amb-btn.off { background: color-mix(in oklab, var(--ink) 10%, transparent); color: var(--ink); }

  .amb-bars { display: inline-flex; gap: 2.5px; align-items: end; height: 14px; }
  .amb-bars i {
    width: 2px; background: currentColor; border-radius: 1px;
    animation: bar 1.2s ease-in-out infinite;
  }
  .amb-bars i:nth-child(1) { height: 30%; animation-delay: -.1s; }
  .amb-bars i:nth-child(2) { height: 70%; animation-delay: -.4s; }
  .amb-bars i:nth-child(3) { height: 50%; animation-delay: -.2s; }
  .amb-bars i:nth-child(4) { height: 90%; animation-delay: -.5s; }
  .amb-paused i { animation: none; height: 30% !important; }
  @keyframes bar { 0%,100% { height: 20%; } 50% { height: 90%; } }

  .amb select, .amb-vol {
    appearance: none; -webkit-appearance: none;
    background: transparent; border: 0; outline: 0;
    color: var(--ink-2); font: 500 12px/1 var(--font-body);
    cursor: default;
  }
  .amb-vol { width: 80px; height: 4px; background: color-mix(in oklab, var(--ink) 15%, transparent); border-radius: 999px; }
  .amb-vol::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink); border: 2px solid var(--bg); }
  .amb-vol::-moz-range-thumb { width: 12px; height: 12px; border-radius: 50%;
    background: var(--ink); border: 2px solid var(--bg); }

  /* encouragement toast */
  .encourage {
    position: fixed; left: 50%; bottom: 14vh;
    transform: translate(-50%, 12px);
    z-index: 50;
    padding: 14px 22px; border-radius: 999px;
    font-family: var(--font-display); font-style: italic; font-weight: 400;
    font-size: clamp(16px, 1.6vw, 20px);
    color: var(--ink); letter-spacing: -.005em;
    background: color-mix(in oklab, white 75%, transparent);
    border: .5px solid color-mix(in oklab, var(--ink) 8%, transparent);
    -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
    box-shadow: 0 8px 24px -10px rgba(40,30,15,.18);
    opacity: 0; pointer-events: none;
    transition: opacity .8s ease, transform .8s ease;
    max-width: min(560px, 88vw); text-align: center;
    text-wrap: balance;
  }
  .encourage.show { opacity: 1; transform: translate(-50%, 0); }
  html[data-theme="navy"] .encourage {
    background: color-mix(in oklab, white 10%, transparent);
    border-color: rgba(255,255,255,.16);
  }

  /* finished overlay */
  .finished {
    position: fixed; inset: 0; z-index: 60;
    display: flex; align-items: center; justify-content: center;
    background: color-mix(in oklab, var(--bg) 85%, transparent);
    -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; transition: opacity .5s ease;
  }
  .finished.show { opacity: 1; pointer-events: auto; }
  .finished-card {
    padding: 40px 48px; border-radius: 24px; text-align: center;
    background: color-mix(in oklab, white 80%, transparent);
    border: .5px solid color-mix(in oklab, var(--ink) 8%, transparent);
    box-shadow: 0 30px 80px -20px rgba(40,30,15,.30);
    max-width: 480px;
  }
  html[data-theme="navy"] .finished-card { background: color-mix(in oklab, white 12%, transparent); }
  .finished-card h2 {
    font-family: var(--font-display); font-weight: 400;
    font-size: clamp(28px, 3vw, 38px); letter-spacing: -.015em;
    margin: 12px 0 8px;
  }
  .finished-card .pill { margin: 4px; }

  /* tiny hint text bottom-left */
  .room-hint {
    position: fixed; left: 24px; bottom: 24px; z-index: 4;
    font: 500 10px/1.4 var(--font-body); color: var(--ink-3);
    letter-spacing: .14em; text-transform: uppercase;
    max-width: 220px;
  }
  @media (max-height: 720px) {
    .room-hint { display: none; }
  }
</style>
